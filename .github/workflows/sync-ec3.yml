name: Sync EC3 Plant Data

on:
  schedule:
    - cron: '0 2 1 * *'   # 1st of each month, 02:00 UTC
  workflow_dispatch:       # manual trigger from Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Trigger EC3 sync via Vercel
        # EC3 requests come from Vercel's IP (not blocked by EC3 WAF).
        # GitHub Actions only orchestrates the pagination loop.
        env:
          VERCEL_URL:  ${{ secrets.VERCEL_URL }}
          SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
        run: node scripts/trigger-sync.js
