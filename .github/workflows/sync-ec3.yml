name: Sync EC3 Plant Data

on:
  # First day of each month at 02:00 UTC
  schedule:
    - cron: '0 2 1 * *'
  # Manual trigger with optional dry-run
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no DB writes, just log output)'
        required: false
        default: 'false'
        type: boolean

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 90        # full global sync can take a while

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install

      - name: Sync EC3 → Supabase
        env:
          EC3_API_KEY:          ${{ secrets.EC3_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            node scripts/sync-ec3.js --dry-run
          else
            node scripts/sync-ec3.js
          fi
